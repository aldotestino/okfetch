name: Docs Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/docs/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve Pages base path
        env:
          REPOSITORY_NAME: ${{ github.event.repository.name }}
          PAGES_BASE_PATH_OVERRIDE: ${{ vars.PAGES_BASE_PATH }}
        run: |
          if [ -n "$PAGES_BASE_PATH_OVERRIDE" ]; then
            BASE_PATH="$PAGES_BASE_PATH_OVERRIDE"
          elif [[ "$REPOSITORY_NAME" == *.github.io ]]; then
            BASE_PATH="/"
          else
            BASE_PATH="/$REPOSITORY_NAME"
          fi

          echo "PAGES_BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          echo "Using base path: $BASE_PATH"

      - name: Build static docs
        working-directory: apps/docs
        env:
          PAGES_BASE_PATH: ${{ env.PAGES_BASE_PATH }}
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/out

  deploy:
    name: Deploy Docs
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
